<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AirSense AI+</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

/* 🌍 GLOBAL */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
}

/* 🎥 VIDEO BACKGROUND */
#bgVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* 🌑 OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* 🔝 NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 15px;
}

.navbar button {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.navbar button:hover {
  background: orange;
}

/* 🧩 TABS */
.tab {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* 💎 CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 20px;
  max-width: 500px;
  margin: 20px auto;
  text-align: center;
}

/* 🔎 INPUT */
input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 60%;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: orange;
  color: white;
  cursor: pointer;
}

/* 🗺️ MAP */
#map {
  height: 400px;
  border-radius: 15px;
  margin-top: 15px;
}

</style>
</head>

<body>

<!-- 🎥 BACKGROUND -->
<video autoplay muted loop id="bgVideo">
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🔝 NAVBAR -->
<div class="navbar">
  <button onclick="openTab('home')">🏠 Home</button>
  <button onclick="openTab('mapTab')">🗺️ Map</button>
  <button onclick="openTab('adviceTab')">🧠 Advice</button>
  <button onclick="openTab('agricultureTab')">🌾 Agriculture</button>
  <button onclick="openTab('outdoorTab')">🏃 Outdoor</button>
  <button onclick="openTab('healthTab')">🫁 Health</button>
</div>

<!-- 🏠 HOME -->
<div id="home" class="tab active">
  <div class="card">
    <h1>🌍 AirSense AI+</h1>
    <p>Your Smart Environmental Assistant</p>

    <input type="text" id="city" placeholder="Enter city">
    <button onclick="getAQI()">Search</button>

    <h2>AQI: <span id="aqi">--</span></h2>
    <h3 id="risk">--</h3>
  </div>
</div>

<!-- 🗺️ MAP -->
<div id="mapTab" class="tab">
  <div class="card">
    <h2>🗺️ Live AQI Map</h2>
    <div id="map"></div>
  </div>
</div>

<!-- 🧠 ADVICE -->
<div id="adviceTab" class="tab">
  <div class="card">
    <h2>🧠 Smart Advice</h2>
    <p id="advice">Fetch AQI first</p>
  </div>
</div>

<!-- 🌾 AGRICULTURE -->
<div id="agricultureTab" class="tab">
  <div class="card">
    <h2>🌾 Agriculture Mode</h2>
    <p id="agricultureAdvice">--</p>
  </div>
</div>

<!-- 🏃 OUTDOOR -->
<div id="outdoorTab" class="tab">
  <div class="card">
    <h2>🏃 Outdoor Mode</h2>
    <p id="outdoorAdvice">--</p>
  </div>
</div>

<!-- 🫁 HEALTH -->
<div id="healthTab" class="tab">
  <div class="card">
    <h2>🫁 Health Mode</h2>
    <p id="healthAdvice">--</p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
